speaker_context:
  # Known speaker traits that help resolve names in context.
  # Accent and verbal patterns that cause specific transcription errors.

  - person: javier
    accent: Spanish (native)
    notes: >
      Spanish J pronounced as H — Granola consistently mishears 'Javi' as 'Harvey'.
      When someone in a meeting refers to 'Harvey' doing engineering work, it is Javier.

  - person: geran
    accent: British
    notes: >
      Name 'Geran' is unusual — Granola has produced at least three variants:
      'Jaren', 'gerund', 'General'. Always check context: data analyst, Snowflake,
      PostHog, Streamlit apps.

  - person: ollie-crowe
    accent: British
    notes: >
      'Ollie' consistently transcribed as 'Holly'. Ollie is a Technical PM on the
      acquisition team, reports to Matt Price. Context: conversion bets, WhatsApp bot,
      Anton/Darren pressure.

  - person: mima
    accent: British
    notes: >
      'Jemima' often shortened to 'Mima' in speech — this is a correct nickname.
      Full name 'Jemima' has been transcribed as 'naima' (Ji dropped, remainder garbled).
      Context: J product, evals, submissions, skills distribution.
