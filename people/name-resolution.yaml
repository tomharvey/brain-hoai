# Granola name resolution
# Used by /granola when resolving names in transcripts.
#
# Three sections:
#   substitutions  — names Granola mishears (errors to correct)
#   nicknames      — short forms that ARE correct (not errors)
#   disambiguation — people who share a first name; use context to tell apart

substitutions:
  # Format:
  #   heard:       what appears in the raw transcript (string or list)
  #   person:      people/ filename (without .md)
  #   phonetics:   why the error happens
  #   guard:       condition under which this substitution applies (optional)
  #   confirmed:   date first confirmed

  - heard: "Harvey"
    person: javier
    phonetics: "'Javi' → 'Harvey' (Spanish J sounds like H to English speech-to-text)"
    guard: "standalone only — 'Tom Harvey' and 'Tom H' are correct"
    confirmed: 2026-04-28

  - heard: ["Jaren", "Jarin", "Jera"]
    person: geran
    phonetics: "phonetic reversal/transposition of 'Geran'"
    confirmed: 2026-05-08

  - heard: ["gerund", "General"]
    person: geran
    phonetics: "different garbling of 'Geran' — similar vowel sounds"
    guard: "only when used as a proper noun referring to a person, not as a grammar term or military rank"
    confirmed: 2026-05-08

  - heard: "Holly"
    person: ollie-crowe
    phonetics: "'Ollie' → 'Holly' (leading H insertion, common with soft O)"
    confirmed: 2026-05-08

  - heard: ["naima", "Naima"]
    person: mima
    phonetics: "speech-to-text drops the 'Ji' from 'Jemima' and garbles '-mima' → 'naima'"
    confirmed: 2026-05-08

  - heard: ["Jebodi", "jebodi"]
    person: jordi
    phonetics: "Granola garbles 'Jordi' — soft Spanish J + 'di' ending → 'Jebodi'"
    confirmed: 2026-05-18

  - heard: ["raki", "Raki"]
    person: rakhee
    phonetics: "'Rakhee' → 'raki' — drops the '-hee' suffix, leaves the root"
    guard: "only when used as a person's name (not the drink)"
    confirmed: 2026-05-27

  - heard: ["araz", "Araz"]
    person: eraaz-ali
    phonetics: "'Eraaz' → 'Araz' — drops the leading 'E', softens 'ee' to short vowel"
    guard: "only when used as a person's name"
    confirmed: 2026-06-15

  - heard: ["Gran"]
    person: geran
    phonetics: "'Geran' → 'Gran' — truncated, drops middle vowel"
    guard: "only when used as a person's name, not as a prefix (e.g. 'Granola')"
    confirmed: 2026-06-17

  - heard: ["Alex unova", "unova"]
    person: aleks-yanova
    phonetics: "'Aleks Yaneva' → 'Alex unova' — anglicised first name, garbled surname"
    guard: "only when used as a person's name in engineering context"
    confirmed: 2026-06-17

  - heard: ["Francesca"]
    person: francesco-venerandi
    phonetics: "'Francesco' → 'Francesca' — gender-swapped Italian ending in speech/transcription"
    guard: "only in pricing/data science context"
    confirmed: 2026-06-17

nicknames:
  # Correct short forms — not transcription errors, just informal names
  # Format:
  #   nickname:  the informal name used in speech and transcript
  #   person:    people/ filename
  #   full_name: canonical full name

  - nickname: "Rocky"
    person: rakhee
    full_name: "Rakhee Gohil"
    confirmed: 2026-06-24

  - nickname: "Mima"
    person: mima
    full_name: "Jemima Pitceathly"

  - nickname: "Javi"
    person: javier
    full_name: "Javier Arranz"

  - nickname: "Jordy"
