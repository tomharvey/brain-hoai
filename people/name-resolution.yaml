disambiguation:
  # People who share a first name. When a first name is ambiguous,
  # use team, domain, and topic context to decide which person is meant.
  # Format:
  #   name:       the ambiguous first name
  #   candidates: list of possible people with context clues

  - name: "Matt"
    candidates:
      - person: matt
        full_name: "Matthew Price"
        role: Head of Product
        team: product
